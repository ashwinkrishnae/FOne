<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 48" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">FollowOne logo</title>
  <desc id="logoDesc">Blue follow button icon with a large F and text FollowOne.</desc>
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d4f8b" />
      <stop offset="100%" stop-color="#3a8dde" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="180" height="48" rx="24" fill="#ffffff" />
  <rect x="4" y="4" width="140" height="40" rx="20" fill="url(#bgGradient)" />
  <circle cx="32" cy="24" r="14" fill="#ffffff" />
  <text x="26" y="31" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0d4f8b">f</text>
  <text x="62" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">Follow</text>
  <text x="62" y="44" font-family="Arial, sans-serif" font-size="12" fill="#dbe9ff">Grow your followers</text>
</svg>
