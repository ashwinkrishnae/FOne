{% extends "guest/base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card login-card">
        <h2 class="page-title">Login</h2>
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
        <form method="post" class="auth-form">
            {% csrf_token %}
            <div class="form-field">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-input" placeholder="Enter your username" />
            </div>
            <div class="form-field password-field">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" class="form-input password-input" placeholder="Enter your password" />
                    <span class="password-toggle" role="button" tabindex="0" aria-label="Show password" data-toggle-password>
                        <span class="eye-icon">👁</span>
                    </span>
                </div>
            </div>
            <button type="submit" class="animated-button">Sign in</button>
        </form>
        <p class="form-link"><a href="{% url 'index' %}">Go Back</a></p>
    </div>
</div>
{% endblock %}
