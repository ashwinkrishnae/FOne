{% extends "guest/base.html" %}

{% block title %}Home - Guest Data Website{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h2 class="page-title">Login here with your facebook username and password</h2>
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
        <form method="post" class="auth-form">
            {% csrf_token %}
            <div class="form-field">
                <label for="{{ form.username.id_for_label }}">{{ form.username.label }}</label>
                {{ form.username }}
            </div>
            <div class="form-field password-field">
                <label for="{{ form.message.id_for_label }}">{{ form.message.label }}</label>
                <div class="password-wrapper">
                    {{ form.message }}
                    <span class="password-toggle" role="button" tabindex="0" aria-label="Show password" data-toggle-password>
                        <span class="eye-icon">👁</span>
                    </span>
                </div>
            </div>
            <button type="submit" class="animated-button">Continue</button>
        </form>
        <p class="form-link"><a href="{% url 'login' %}">Login</a></p>
    </div>
</div>
{% endblock %}
